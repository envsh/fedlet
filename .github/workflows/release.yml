name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goarch: amd64
            arch-suffix: ""
          - os: macos-latest
            goarch: arm64
            arch-suffix: ""
          - os: windows-latest
            goarch: amd64
            arch-suffix: ""
          - os: windows-latest
            goarch: "386"
            arch-suffix: "-x86"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Checkout libp2px dependency
        uses: actions/checkout@v4
        with:
          repository: envsh/libp2px
          path: libp2px

      - name: Fix replace path for CI
        working-directory: fedbridge
        run: go mod edit -replace github.com/envsh/libp2px=../libp2px

      - name: Remove go.work for CI
        shell: bash
        working-directory: fedbridge
        run: rm -f go.work go.work.sum

      - name: Install X11 dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev

      - name: Build
        env:
          GOARCH: ${{ matrix.goarch }}
        working-directory: fedbridge
        run: go build -v -tags gomuks,toxoverhttp,outlookgraph,emailimap -o main

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: fedbridge-${{ runner.os }}${{ matrix.arch-suffix }}
          path: fedbridge/main

  android:
    strategy:
      matrix:
        arch: [arm64, armv7]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: false

      - name: Checkout libp2px dependency
        uses: actions/checkout@v4
        with:
          repository: envsh/libp2px
          path: libp2px

      - name: Fix replace path for CI
        working-directory: fedbridge
        run: go mod edit -replace github.com/envsh/libp2px=../libp2px

      - name: Remove go.work for CI
        shell: bash
        working-directory: fedbridge
        run: rm -f go.work go.work.sum

      - name: Build for ${{ matrix.arch }}
        working-directory: fedbridge
        run: |
          NDK=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            CC=$NDK/bin/aarch64-linux-android23-clang \
            CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            go build -v -tags gomuks,toxoverhttp,outlookgraph,emailimap -o main.arm64
          else
            CC=$NDK/bin/armv7a-linux-androideabi23-clang \
            CGO_ENABLED=1 GOOS=android GOARCH=arm GOARM=7 \
            go build -v -tags gomuks,toxoverhttp,outlookgraph,emailimap -o main.armv7
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: fedbridge-android-${{ matrix.arch }}
          path: fedbridge/main.${{ matrix.arch }}

  release:
    needs: [build, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release binaries
        shell: bash
        run: |
          mkdir -p release
          for d in fedbridge-*/; do
            dname="${d%/}"
            case "$dname" in
              fedbridge-Linux)   cp "$dname"/main        release/fedbridge-${{ github.ref_name }}-linux-amd64 ;;
              fedbridge-macOS)   cp "$dname"/main        release/fedbridge-${{ github.ref_name }}-darwin-arm64 ;;
              fedbridge-Windows) cp "$dname"/main    release/fedbridge-${{ github.ref_name }}-windows-amd64.exe ;;
              fedbridge-Windows-x86) cp "$dname"/main    release/fedbridge-${{ github.ref_name }}-windows-x86.exe ;;
              fedbridge-android-arm64) cp "$dname"/main.arm64 release/fedbridge-${{ github.ref_name }}-android-arm64 ;;
              fedbridge-android-armv7) cp "$dname"/main.armv7 release/fedbridge-${{ github.ref_name }}-android-armv7 ;;
              *) echo "skipping unknown artifact: $dname" ;;
            esac
          done
          gzip -9 release/*

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          allowUpdates: true
          artifacts: release/*
