name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Checkout libp2px dependency
        uses: actions/checkout@v4
        with:
          repository: envsh/libp2px
          path: libp2px

      - name: Fix replace path for CI
        working-directory: fedbridge
        run: go mod edit -replace github.com/envsh/libp2px=../libp2px

      - name: Remove go.work for CI
        shell: bash
        working-directory: fedbridge
        run: rm -f go.work go.work.sum

      - name: Install X11 dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev

      - name: Build
        working-directory: fedbridge
        run: go build -v -tags gomuks,toxoverhttp,outlookgraph,emailimap -o main

      - name: Vet
        working-directory: fedbridge
        run: go vet ./...

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: fedbridge-${{ runner.os }}
          path: fedbridge/main${{ runner.os == 'Windows' && '.exe' || '' }}

  android:
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, armv7]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: false

      - name: Checkout libp2px dependency
        uses: actions/checkout@v4
        with:
          repository: envsh/libp2px
          path: libp2px

      - name: Fix replace path for CI
        working-directory: fedbridge
        run: go mod edit -replace github.com/envsh/libp2px=../libp2px

      - name: Remove go.work for CI
        shell: bash
        working-directory: fedbridge
        run: rm -f go.work go.work.sum

      - name: Build for ${{ matrix.arch }}
        working-directory: fedbridge
        run: |
          NDK=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            CC=$NDK/bin/aarch64-linux-android23-clang \
            CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            go build -v -tags gomuks,toxoverhttp,outlookgraph,emailimap -o main.arm64
          else
            CC=$NDK/bin/armv7a-linux-androideabi23-clang \
            CGO_ENABLED=1 GOOS=android GOARCH=arm GOARM=7 \
            go build -v -tags gomuks,toxoverhttp,outlookgraph,emailimap -o main.armv7
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: fedbridge-android-${{ matrix.arch }}
          path: fedbridge/main.${{ matrix.arch }}
